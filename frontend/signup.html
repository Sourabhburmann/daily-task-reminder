<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Daily Task Reminder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div id="toast"></div>

  <div class="card auth-card">
    <div class="auth-logo">
      <div class="logo-icon">📋</div>
      <h1>Daily Task Reminder</h1>
      <p>Create your account</p>
    </div>

    <div id="error-msg" class="alert alert-error"></div>

    <form id="signup-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" class="input-field" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="input-field" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="input-field" placeholder="Min. 6 characters" required />
      </div>
      <button type="submit" id="submit-btn" class="btn-primary" style="width:100%;padding:.65rem;">Create Account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </p>
  </div>

  <script src="app.js?v=5"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.remove('show');

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) {
        errEl.textContent = 'All fields are required';
        errEl.classList.add('show');
        return;
      }

      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const data = await apiFetch('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({ name, email, password }),
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message || 'Signup failed. Please try again.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
